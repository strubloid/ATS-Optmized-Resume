app = "curriculum-optimizer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "3333"
  WEB_DIST_DIR = "/app/apps/web/dist"
  EXPORT_DIR = "/data/exports"
  AI_PROVIDER = "rules-only"

[[mounts]]
  source = "curriculum_exports"
  destination = "/data"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
