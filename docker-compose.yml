services:
  postgres:
    image: postgres:16-alpine
    container_name: curriculum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: curriculum_optimizer
      POSTGRES_USER: curriculum
      POSTGRES_PASSWORD: curriculum_password
    # PostgreSQL is reachable by the app as `postgres:5432`; no host port is
    # needed, so local PostgreSQL installations cannot conflict with Compose.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curriculum -d curriculum_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: curriculum-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3333
      WEB_ORIGIN: http://localhost:${FRONTEND_PORT:-6688}
      DATABASE_URL: postgresql://curriculum:curriculum_password@postgres:5432/curriculum_optimizer?schema=public
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:3333/api/auth/google/callback}
      GOOGLE_OAUTH_SUCCESS_REDIRECT: ${GOOGLE_OAUTH_SUCCESS_REDIRECT:-http://localhost:6688}
      AI_PROVIDER: rules-only
      EXPORT_DIR: /data/exports
    ports:
      - "${API_PORT:-3333}:3333"
      - "${FRONTEND_PORT:-6688}:3333"
    volumes:
      - export-data:/data/exports

  typecheck:
    build:
      context: .
      target: tooling
    command: npm run typecheck
    profiles: ["tools"]

  adminer:
    image: adminer:4
    container_name: curriculum-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  export-data:
